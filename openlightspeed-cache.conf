# OpenLightSpeed Cache Configuration
# Place this in your OpenLightSpeed configuration or use as reference

# Container for cache settings
CacheSetting Default {
  enableCache            1
  cachePolicy            2
  cacheCGIResp           1
  cacheRespCookie        1
  privateAge             300
  expireInSeconds        3600
  enableIpSessionCache   0
  
  # Cache rules for static content
  expirInSeconds         31536000
  staticReqCacheTimeout  3600
  dontCacheRespCookie    Set-Cookie
  
  # Enable compression
  compressText           1
  compressLevel          6
}

# Caching for specific content types
CachedContext /images {
  location                 /images/
  enableCache              1
  cachePolicy              2
  expireInSeconds          31536000
  cachable                 public
}

CachedContext /css {
  location                 /css/
  enableCache              1
  cachePolicy              2
  expireInSeconds          2592000
  cachable                 public
}

CachedContext /js {
  location                 /js/
  enableCache              1
  cachePolicy              2
  expireInSeconds          2592000
  cachable                 public
}

CachedContext /html {
  location                 /
  enableCache              1
  cachePolicy              2
  expireInSeconds          0
  cachable                 public
  mustRevalidate           1
}

# For HTML pages - aggressive caching with validation
CachedContext *.html {
  allowedMethods           GET,HEAD
  cachePolicy              2
  expireInSeconds          0
  enableCache              1
  cachable                 public
}

# Gzip compression settings
GzipCompressLevel         6
CompressibleTypes         text/html, text/plain, text/css, text/javascript, application/javascript, application/json, image/svg+xml, application/font-woff, application/font-woff2, font/ttf, font/otf
