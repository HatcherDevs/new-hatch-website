<head>
    
    <style>
        *{
            padding: 0;
            margin: 0;
        }
        /**Typeo CSS End**/
        .video-custom {
            margin: 0px auto;
            max-width: 100%;
            position: relative;
            height: 100%;
            width: 100%;
        }


        .video-custom .poster-img {
            display: block;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }

        .video-custom video {
            position: absolute;
            left: 0px;
            top: 0px;
            display: block;
            width: 100%;
            opacity: 1;
        }

        .video-custom .play-btn,
        .video-custom .pause-btn {
            position: absolute;
            left: 0px;
            right: 0px;
            bottom: 0px;
            top: 0px;
            margin: auto;
            width: 100px;
            height: 100px;
            border-radius: 100%;
            background-color: #0514F0;
            z-index: 3;
            cursor: pointer;
            transition: 0.5s all;
            overflow: hidden;
        }

        .video-custom .pause-btn {
            display: none;
        }

        .video-custom .play-btn i {
            width: 0;
            height: 0;
            border-style: solid;
            border-top: 15px solid transparent;
            border-bottom: 15px solid transparent;
            border-left: 18px solid #ffffff;
            border-right: 0;
            position: absolute;
            left: 0px;
            right: 0px;
            bottom: 0px;
            top: 0px;
            margin: auto;
        }

        .pause-btn i {
            position: absolute;
            left: -3px;
            right: 0px;
            bottom: 0px;
            top: 2px;
            margin: auto;
            width: 16px;
            height: 24px;
            flex-flow: row wrap;
        }

        .pause-btn i:before {
            content: '';
            width: 4px;
            height: 100%;
            background-color: #000;
            display: inline-block;
        }

        .pause-btn i:after {
            content: '';
            width: 4px;
            height: 100%;
            margin-left: 8px;
            background-color: #000;
            display: inline-block;
        }

        .playvideo .video-custom img {
            opacity: 0;
            width: 100%;
            height: 100%;
        }

        .playvideo .video-custom video {
            opacity: 1;
        }

        .video-custom .vplay {
            display: none;
        }

        .video-custom:hover .vplay+.pause-btn {
            display: block;
        }

        /***Volume Control***/
        html:not(.playvideo) .sound-ctrl {
            display: none;
        }

        .sound-ctrl {
            position: absolute;
            z-index: 2;
            right: 14px;
            bottom: 5px;
            cursor: pointer;
        }

        .sound-ctrl .on-button {
            display: none;
        }

        .sound-ctrl img {
            opacity: 0;
        }

        .sound-ctrl .off-button,
        .sound-ctrl .on-button {
            position: absolute;
            left: 0px;
            top: 0px;
            font-size: 0px;
            background-color: transparent;
            border: none;
            width: 100%;
            height: 100%;
            padding: 0px;
            cursor: pointer;
        }

        .soundctrlshow .on-button {
            display: block;
        }

        .soundctrlshow .off-button {
            display: none;
        }

        .playvideo .video-custom .sound-ctrl img {
            opacity: 1;
        }

        .soundctrlshow .on-button:before {
            content: '';
            position: absolute;
            left: 12px;
            top: -5px;
            z-index: 10;
            width: 3px;
            height: 32px;
            background-color: #fff;
            transform: rotate(45deg);
        }

        /***Volume Control***/
        @media(max-width:800px) {
            .video-custom {
                width: 100%
            }

        }


        #page2:hover .play-btn,
        #page2:hover .pause-btn {
            opacity: 0;
            width: 100%;
            height: 100%;
            border-radius: 0px;
            -webkit-border-radius: 0px;
            -moz-border-radius: 0px;
            -ms-border-radius: 0px;
            -o-border-radius: 0px;
        }
    </style>
</head>

<body>


    <div id="main">

        <div id="page2" class="">
            <!-- <video id="background-video" width="100%"  loop muted controls poster="imgs/timeline-video.png">
                <source src="https://assets.codepen.io/6093409/river.mp4" type="video/mp4">
            </video>

            <div class="play_video_bg">
                <a class="play_video" type="button">Play</a>
            </div> -->

            <div class="video-custom">
                <div class="play-pause">
                    <a class="play-btn btnVideo" id="play_button"><i></i></a>
                    <a id="pause_button" class="pause-btn btnVideo"><i></i></a>
                </div>
                <img class="poster-img"
                    src="imgs/timeline-video.png"
                    alt="Model Popup">
                <video id="video" width="100%" poster="imgs/timeline-video.png">
                    <source src="https://assets.codepen.io/6093409/river.mp4" data-wf-ignore="true">
                </video>
                <!--Volume Control Start-->
                <div class="sound-ctrl">
                    <img src="https://coderwrap.com/wp-content/uploads/2023/01/volume-icon.svg" alt="Volume">
                    <button class="off-button" id="sound-off" type="button">OFF</button>
                    <button class="on-button" id="sound-on" type="button">ON</button>
                </div>
                <!--Volume Control End-->
            </div>

        </div>
    </div>




    <div class="cursor" style="padding: 15px;">
        <span class="d-none">Play</span>
    </div>
    <script>
        //Video Play Pause Control Start
let playButton = document.getElementById("play_button");
let pauseButton = document.getElementById("pause_button");
playButton.addEventListener("click", function() {
  video.play();
  playButton.classList.add('vplay');
  pauseButton.classList.remove('vpause');
  document.querySelector('html').classList.add('playvideo');
});

pauseButton.addEventListener("click", function() {
	video.pause();
	 playButton.classList.remove('vplay');
  pauseButton.classList.add('vpause');
});
//Video Play Pause Control End
//Video Sound on & off Ctrl Start
let soundOff = document.getElementById("sound-off");
let soundOn = document.getElementById("sound-on");
let soundCtrl = document.querySelector(".sound-ctrl");

soundOff.addEventListener("click", function() {
 video.muted = true;
 soundCtrl.classList.add('soundctrlshow');
});

soundOn.addEventListener("click", function() {
	video.muted = false;
	soundCtrl.classList.remove('soundctrlshow'); 
});
//Video Sound on & off Ctrl End
video.onended = function() {
		document.querySelector('html').classList.remove('playvideo');
	 playButton.classList.remove('vplay');
};



    </script>
</body>

</html>
